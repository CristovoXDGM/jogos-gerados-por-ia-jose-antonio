<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Road Fighter - Obstacles Edition</title>
    <style>
        :root {
            --ui-bg: rgba(255, 255, 255, 0.9);
            --accent: #0077ff;
            --fuel-ok: #2ecc71;
            --fuel-low: #e74c3c;
            --text-dark: #2c3e50;
            --easy: #2ecc71;
            --medium: #f1c40f;
            --hard: #e74c3c;
        }

        body {
            margin: 0;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #game-container {
            position: relative;
            width: 960px;
            height: 540px;
            background: #000;
            border: 4px solid #333;
            border-radius: 12px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
            overflow: hidden;
        }

        canvas { display: block; }

        #ui-layer {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 150px;
            background: var(--ui-bg);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 0, 0, 0.1);
            border-radius: 12px;
            padding: 15px;
            color: var(--text-dark);
            z-index: 10;
        }

        .stat-box { margin-bottom: 12px; }
        .stat-label { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; color: #7f8c8d; font-weight: bold; }
        .stat-value { font-size: 22px; font-weight: 800; color: #2c3e50; }

        #fuel-meter-container {
            width: 100%;
            height: 12px;
            background: rgba(0,0,0,0.1);
            border-radius: 6px;
            margin-top: 5px;
            overflow: hidden;
        }

        #fuel-fill {
            height: 100%;
            width: 100%;
            background: var(--fuel-ok);
            transition: width 0.3s ease;
        }

        .overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: #2c3e50;
            z-index: 100;
            text-align: center;
        }

        #level-announcer {
            position: absolute;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 80px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.5s, transform 0.5s;
            z-index: 50;
        }

        h1 { 
            font-size: 64px; 
            margin: 0; 
            color: #e74c3c;
            text-shadow: 2px 2px 0px #f39c12;
            letter-spacing: -2px;
        }

        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }

        button {
            border: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
            color: #fff;
        }

        .btn-easy { background: var(--easy); box-shadow: 0 4px 0px #27ae60; }
        .btn-medium { background: var(--medium); box-shadow: 0 4px 0px #d4ac0d; }
        .btn-hard { background: var(--hard); box-shadow: 0 4px 0px #c0392b; }

        button:hover { transform: translateY(-2px); filter: brightness(1.1); }
        button:active { transform: translateY(2px); box-shadow: 0 0px 0px transparent; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<div id="game-container">
    <canvas id="gameCanvas"></canvas>

    <div id="level-announcer">NÍVEL 1</div>

    <div id="ui-layer">
        <div class="stat-box">
            <div class="stat-label">Dificuldade</div>
            <div id="diff-val" class="stat-value" style="font-size: 14px;">MÉDIO</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Nível</div>
            <div id="level-val" class="stat-value">1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Pontos</div>
            <div id="score-val" class="stat-value">000000</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Meta</div>
            <div id="dist-val" class="stat-value">1.0km</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">Fuel</div>
            <div id="fuel-meter-container">
                <div id="fuel-fill"></div>
            </div>
        </div>
    </div>

    <div id="start-screen" class="overlay">
        <h1>ROAD FIGHTER</h1>
        <p style="color: #34495e; letter-spacing: 2px; font-weight: bold;">ESCOLHA A SUA DIFICULDADE</p>
        <div class="btn-group">
            <button class="btn-easy" onclick="startGame('easy')">Fácil</button>
            <button class="btn-medium" onclick="startGame('medium')">Médio</button>
            <button class="btn-hard" onclick="startGame('hard')">Difícil</button>
        </div>
    </div>

    <div id="game-over-screen" class="overlay hidden">
        <h2 id="death-reason" style="font-size: 42px; color: #e74c3c;">FIM DE JOGO</h2>
        <div id="final-score" style="font-size: 64px; font-weight: 900; color: #2c3e50; margin-bottom: 20px;">0</div>
        <button class="btn-medium" style="color:white" onclick="showStartScreen()">Voltar ao Menu</button>
    </div>
    
    <div id="victory-screen" class="overlay hidden">
        <h2 style="font-size: 42px; color: #f1c40f;">CAMPEÃO!</h2>
        <p>Completaste o desafio!</p>
        <div id="victory-score" style="font-size: 64px; font-weight: 900; color: #2c3e50; margin-bottom: 20px;">0</div>
        <button class="btn-medium" style="color:white" onclick="showStartScreen()">Voltar ao Menu</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score-val');
    const distEl = document.getElementById('dist-val');
    const levelEl = document.getElementById('level-val');
    const diffEl = document.getElementById('diff-val');
    const fuelFill = document.getElementById('fuel-fill');
    const levelAnnouncer = document.getElementById('level-announcer');
    
    const CANVAS_W = 960, CANVAS_H = 540;
    canvas.width = CANVAS_W; canvas.height = CANVAS_H;

    const ROAD_WIDTH = 340;
    const ROAD_X = (CANVAS_W - ROAD_WIDTH) / 2;

    const LEVEL_CONFIGS = [
        { name: "COSTA VERDE", grass: "#45a049", road: "#5a5a5f", marks: "#ffffff", scenery: "#2d5a27", dist: 1000, spawnRate: 1000 },
        { name: "NOITE URBANA", grass: "#0a0a1f", road: "#15151a", marks: "#00f2ff", scenery: "#1a1a3a", dist: 1200, spawnRate: 900 },
        { name: "DESERTO", grass: "#edc9af", road: "#7a5c44", marks: "#f39c12", scenery: "#c27e3a", dist: 1500, spawnRate: 800 },
        { name: "ÁRTICO GÉLIDO", grass: "#ffffff", road: "#a0b0c0", marks: "#ffffff", scenery: "#d0e0f0", dist: 1800, spawnRate: 700 },
        { name: "VULCÃO", grass: "#2c0a0a", road: "#1a1a1a", marks: "#ff4400", scenery: "#ff0000", dist: 2000, spawnRate: 600 }
    ];

    let state = 'START';
    let currentLevel = 0;
    let score = 0, distance = 1000, fuel = 100, speed = 0;
    let maxSpeed = 16, scrollPos = 0, keys = {}, particles = [], scenery = [];
    let player = { x: CANVAS_W / 2 - 17, y: 440, w: 34, h: 60, color: '#e74c3c', type: 'car' };
    let enemies = [], fuelItems = [], obstacles = [];
    
    // Parâmetros de dificuldade
    let difficultySettings = {
        label: 'MÉDIO',
        maxSpeedBonus: 0,
        fuelDecayMult: 1,
        spawnRateMult: 1,
        potholeChance: 0.1
    };

    // --- ÁUDIO ---
    let audioCtx, engineOsc = null, engineGain = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function startEngineSound() {
        if (!audioCtx) return;
        if (engineOsc) stopEngineSound();
        engineOsc = audioCtx.createOscillator();
        engineGain = audioCtx.createGain();
        engineOsc.type = 'triangle';
        engineOsc.frequency.setValueAtTime(50, audioCtx.currentTime);
        engineGain.gain.setValueAtTime(0.04, audioCtx.currentTime);
        engineOsc.connect(engineGain);
        engineGain.connect(audioCtx.destination);
        engineOsc.start();
    }

    function updateEngineSound() {
        if (engineOsc && audioCtx) {
            const targetFreq = 50 + (speed * 10) + (currentLevel * 5);
            engineOsc.frequency.setTargetAtTime(targetFreq, audioCtx.currentTime, 0.1);
        }
    }

    function stopEngineSound() {
        if (engineOsc) { engineOsc.stop(); engineOsc.disconnect(); engineOsc = null; }
    }

    function playSound(freq, type, duration, vol, endFreq = null) {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
        if (endFreq) osc.frequency.exponentialRampToValueAtTime(endFreq, audioCtx.currentTime + duration);
        g.gain.setValueAtTime(vol, audioCtx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
        osc.connect(g); g.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + duration);
    }

    // --- RENDER ---

    function drawVehicle(v) {
        ctx.fillStyle = 'rgba(0,0,0,0.2)';
        ctx.beginPath(); 
        ctx.ellipse(v.x + v.w/2, v.y + v.h + 2, v.w/2 + 4, 6, 0, 0, Math.PI * 2); 
        ctx.fill();

        ctx.fillStyle = v.color;
        switch(v.type) {
            case 'truck':
                ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 4); ctx.fill();
                ctx.fillStyle = 'rgba(0,0,0,0.2)';
                ctx.fillRect(v.x, v.y + 35, v.w, 4);
                ctx.fillStyle = '#1a1a1a';
                ctx.fillRect(v.x + 5, v.y + 10, v.w - 10, 15);
                break;
            case 'moto':
                ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 8); ctx.fill();
                ctx.fillStyle = '#000';
                ctx.fillRect(v.x + 4, v.y + 5, v.w - 8, 15);
                ctx.fillStyle = v.isPlayer ? '#f1c40f' : '#fff';
                ctx.fillRect(v.x + 6, v.y + 2, 4, 3);
                break;
            case 'bike':
                ctx.fillStyle = '#333';
                ctx.fillRect(v.x + v.w/2 - 2, v.y, 4, v.h);
                ctx.fillStyle = v.color;
                ctx.beginPath(); ctx.arc(v.x + v.w/2, v.y + 10, 5, 0, Math.PI*2); ctx.fill();
                break;
            default:
                ctx.beginPath(); ctx.roundRect(v.x, v.y, v.w, v.h, 6); ctx.fill();
                const grad = ctx.createLinearGradient(v.x, v.y, v.x + v.w, v.y);
                grad.addColorStop(0, 'rgba(255,255,255,0.4)');
                grad.addColorStop(0.5, 'rgba(255,255,255,0)');
                grad.addColorStop(1, 'rgba(0,0,0,0.1)');
                ctx.fillStyle = grad;
                ctx.fill();
                ctx.fillStyle = '#2c3e50';
                ctx.beginPath(); ctx.roundRect(v.x + 4, v.y + 12, v.w - 8, 18, 2); ctx.fill();
                ctx.fillStyle = v.isPlayer ? '#f1c40f' : '#c0392b';
                ctx.fillRect(v.x + 4, v.y + (v.isPlayer ? 2 : v.h - 4), 6, 3);
                ctx.fillRect(v.x + v.w - 10, v.y + (v.isPlayer ? 2 : v.h - 4), 6, 3);
        }
    }

    function drawPothole(p) {
        ctx.fillStyle = 'rgba(0,0,0,0.4)';
        ctx.beginPath();
        ctx.ellipse(p.x + p.w/2, p.y + p.h/2, p.w/2, p.h/2, 0, 0, Math.PI * 2);
        ctx.fill();
        // Detalhe interno para parecer fundo
        ctx.fillStyle = 'rgba(0,0,0,0.6)';
        ctx.beginPath();
        ctx.ellipse(p.x + p.w/2 + 2, p.y + p.h/2 + 2, p.w/3, p.h/3, 0, 0, Math.PI * 2);
        ctx.fill();
    }

    function drawEnvironment() {
        const config = LEVEL_CONFIGS[currentLevel];
        ctx.fillStyle = config.grass;
        ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);
        scenery.forEach(s => {
            ctx.fillStyle = s.color;
            ctx.beginPath(); ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2); ctx.fill();
        });
        ctx.fillStyle = config.road;
        ctx.fillRect(ROAD_X, 0, ROAD_WIDTH, CANVAS_H);
        ctx.fillStyle = config.marks;
        ctx.fillRect(ROAD_X + 2, 0, 4, CANVAS_H);
        ctx.fillRect(ROAD_X + ROAD_WIDTH - 6, 0, 4, CANVAS_H);
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        const dashH = 50, gap = 50;
        for (let i = -100; i < CANVAS_H; i += dashH + gap) {
            const y = i + (scrollPos % (dashH + gap));
            ctx.fillRect(ROAD_X + ROAD_WIDTH/3, y, 2, dashH);
            ctx.fillRect(ROAD_X + (ROAD_WIDTH/3)*2, y, 2, dashH);
        }
    }

    function initScenery() {
        scenery = [];
        const config = LEVEL_CONFIGS[currentLevel];
        for(let i=0; i<30; i++) {
            scenery.push({
                x: Math.random() < 0.5 ? Math.random()*(ROAD_X-50) : (ROAD_X+ROAD_WIDTH+50) + Math.random()*(CANVAS_W - (ROAD_X+ROAD_WIDTH+50)),
                y: Math.random() * CANVAS_H,
                size: 8 + Math.random() * 20,
                color: config.scenery
            });
        }
    }

    function announceLevel() {
        const config = LEVEL_CONFIGS[currentLevel];
        levelAnnouncer.innerText = config.name;
        levelAnnouncer.style.opacity = 1;
        levelAnnouncer.style.transform = 'translate(-50%, -50%) scale(1.2)';
        setTimeout(() => {
            levelAnnouncer.style.opacity = 0;
            levelAnnouncer.style.transform = 'translate(-50%, -50%) scale(1)';
        }, 2000);
    }

    function update() {
        if (state !== 'PLAYING') return;

        if (keys['ArrowLeft'] && player.x > ROAD_X + 10) player.x -= (6 + currentLevel/2);
        if (keys['ArrowRight'] && player.x < ROAD_X + ROAD_WIDTH - player.w - 10) player.x += (6 + currentLevel/2);
        
        if (keys['ArrowUp']) speed = Math.min(speed + 0.2, maxSpeed + currentLevel + difficultySettings.maxSpeedBonus);
        else speed = Math.max(speed - 0.1, 3);

        updateEngineSound();
        scrollPos += speed;
        distance -= speed / 50;
        score += speed / 4;
        fuel -= (0.05 + currentLevel * 0.01) * difficultySettings.fuelDecayMult;

        scoreEl.innerText = Math.floor(score).toString().padStart(6, '0');
        distEl.innerText = Math.max(0, distance/100).toFixed(1) + 'km';
        levelEl.innerText = (currentLevel + 1);
        diffEl.innerText = difficultySettings.label;
        fuelFill.style.width = fuel + '%';
        fuelFill.style.background = fuel < 25 ? 'var(--fuel-low)' : 'var(--fuel-ok)';

        if (fuel <= 0) { endGame('PANE SECA'); return; }
        
        if (distance <= 0) {
            if (currentLevel < LEVEL_CONFIGS.length - 1) {
                currentLevel++;
                distance = LEVEL_CONFIGS[currentLevel].dist;
                fuel = Math.min(100, fuel + 50);
                playSound(600, 'sine', 0.5, 0.1, 1200);
                initScenery();
                announceLevel();
            } else {
                winGame();
                return;
            }
        }

        ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);
        drawEnvironment();

        scenery.forEach(s => {
            s.y += speed * 0.7;
            if (s.y > CANVAS_H + 50) s.y = -50;
        });

        // Buracos
        for(let i = obstacles.length - 1; i >= 0; i--) {
            let p = obstacles[i]; p.y += speed;
            drawPothole(p);
            // Colisão com Buraco (penalização)
            if (player.x < p.x + p.w && player.x + player.w > p.x &&
                player.y < p.y + p.h && player.y + player.h > p.y) {
                speed = Math.max(2, speed - 5);
                fuel -= 2; // Dano mecânico perde fuel
                playSound(150, 'sawtooth', 0.2, 0.2);
                obstacles.splice(i, 1);
                continue;
            }
            if (p.y > CANVAS_H + 100) obstacles.splice(i, 1);
        }

        for(let i = fuelItems.length - 1; i >= 0; i--) {
            let f = fuelItems[i]; f.y += speed;
            ctx.fillStyle = '#2ecc71'; ctx.beginPath(); ctx.roundRect(f.x, f.y, 28, 28, 4); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.font = 'bold 16px Arial'; ctx.fillText('F', f.x+8, f.y+20);
            if (Math.abs(player.x - f.x) < 30 && Math.abs(player.y - f.y) < 40) {
                fuel = Math.min(100, fuel + 25);
                playSound(900, 'square', 0.15, 0.1);
                fuelItems.splice(i, 1);
            } else if (f.y > CANVAS_H) fuelItems.splice(i, 1);
        }

        for(let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i]; e.y += (speed - e.speed);
            drawVehicle(e);
            if (player.x < e.x + e.w - 4 && player.x + player.w > e.x + 4 &&
                player.y < e.y + e.h - 4 && player.y + player.h > e.y + 4) {
                playSound(80, 'sawtooth', 0.6, 0.3);
                endGame('COLISÃO FATAL');
                return;
            }
            if (e.y > CANVAS_H + 300 || e.y < -500) enemies.splice(i, 1);
        }

        drawVehicle({...player, isPlayer: true});
        requestAnimationFrame(update);
    }

    let spawnTimeout;
    function spawn() {
        if (state !== 'PLAYING') return;
        const config = LEVEL_CONFIGS[currentLevel];
        
        const vehiclesToSpawn = (difficultySettings.label === 'DIFÍCIL' && Math.random() > 0.6) ? 2 : 1;
        const occupiedLanes = [];

        for (let j = 0; j < vehiclesToSpawn; j++) {
            let lane;
            do {
                lane = Math.floor(Math.random() * 3);
            } while (occupiedLanes.includes(lane));
            occupiedLanes.push(lane);

            const x_base = ROAD_X + 25 + (lane * 100);
            
            // Spawn de Fuel
            if (Math.random() > 0.9 && j === 0) {
                fuelItems.push({ x: x_base, y: -100 });
            } 
            // Spawn de Buraco (Pothole) - Apenas em Médio e Difícil
            else if (Math.random() < difficultySettings.potholeChance && j === 0 && difficultySettings.label !== 'FÁCIL') {
                obstacles.push({ x: x_base + 5, y: -100, w: 40, h: 30 });
            }
            // Spawn de Veículos
            else {
                const types = [
                    { type: 'car', w: 34, h: 60, speedVar: 6 },
                    { type: 'car', w: 36, h: 65, speedVar: 5 },
                    { type: 'truck', w: 44, h: 100, speedVar: 3 },
                    { type: 'moto', w: 16, h: 40, speedVar: 9 },
                    { type: 'bike', w: 12, h: 30, speedVar: 1 }
                ];
                const vType = types[Math.floor(Math.random() * types.length)];
                const colors = ['#2980b9', '#f39c12', '#8e44ad', '#7f8c8d', '#2c3e50', '#ffffff'];
                const bonusSpeed = difficultySettings.label === 'DIFÍCIL' ? 3 : 0;
                
                enemies.push({ 
                    x: x_base + (34 - vType.w)/2,
                    y: -150 - (j * 50),
                    w: vType.w, h: vType.h, type: vType.type,
                    color: colors[Math.floor(Math.random()*colors.length)], 
                    speed: 4 + Math.random() * (vType.speedVar + currentLevel + bonusSpeed) 
                });
            }
        }
        
        const waitTime = (config.spawnRate * difficultySettings.spawnRateMult) + Math.random() * 400;
        spawnTimeout = setTimeout(spawn, waitTime);
    }

    function startGame(difficulty) {
        initAudio(); if (audioCtx.state === 'suspended') audioCtx.resume();
        
        switch(difficulty) {
            case 'easy':
                difficultySettings = { label: 'FÁCIL', maxSpeedBonus: -2, fuelDecayMult: 0.7, spawnRateMult: 1.3, potholeChance: 0 };
                break;
            case 'medium':
                difficultySettings = { label: 'MÉDIO', maxSpeedBonus: 0, fuelDecayMult: 1.0, spawnRateMult: 1.0, potholeChance: 0.15 };
                break;
            case 'hard':
                difficultySettings = { label: 'DIFÍCIL', maxSpeedBonus: 4, fuelDecayMult: 1.4, spawnRateMult: 0.45, potholeChance: 0.25 };
                break;
        }

        state = 'PLAYING'; currentLevel = 0; score = 0; distance = LEVEL_CONFIGS[0].dist; fuel = 100; speed = 4;
        enemies = []; fuelItems = []; obstacles = []; initScenery();
        
        document.getElementById('start-screen').classList.add('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('victory-screen').classList.add('hidden');
        
        playSound(440, 'sine', 0.4, 0.1);
        startEngineSound();
        announceLevel();
        spawn(); update();
    }

    function showStartScreen() {
        state = 'START';
        stopEngineSound();
        clearTimeout(spawnTimeout);
        document.getElementById('start-screen').classList.remove('hidden');
        document.getElementById('game-over-screen').classList.add('hidden');
        document.getElementById('victory-screen').classList.add('hidden');
        drawEnvironment();
        drawVehicle({...player, isPlayer: true});
    }

    function endGame(reason) {
        state = 'GAMEOVER'; stopEngineSound(); clearTimeout(spawnTimeout);
        document.getElementById('game-over-screen').classList.remove('hidden');
        document.getElementById('death-reason').innerText = reason;
        document.getElementById('final-score').innerText = Math.floor(score);
    }

    function winGame() {
        state = 'VICTORY'; stopEngineSound(); clearTimeout(spawnTimeout);
        document.getElementById('victory-screen').classList.remove('hidden');
        document.getElementById('victory-score').innerText = Math.floor(score);
        playSound(880, 'sine', 1, 0.2, 440);
    }

    window.addEventListener('keydown', e => keys[e.code] = true);
    window.addEventListener('keyup', e => keys[e.code] = false);

    drawEnvironment();
    drawVehicle({...player, isPlayer: true});
</script>
</body>
</html>
